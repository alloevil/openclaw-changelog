<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenClaw Changelog</title>
<link rel="icon" href="favicon.ico" type="image/x-icon">
<style>
/* ========== Reset & Base ========== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-primary: #0a0a0f;
  --bg-secondary: #12121a;
  --bg-card: #16161f;
  --bg-hover: #1c1c28;
  --bg-detail: #1a1a25;
  --border: #232333;
  --border-light: #2a2a3d;
  --text-primary: #e8e8ed;
  --text-secondary: #8b8ba0;
  --text-muted: #5c5c72;
  --accent: #6c5ce7;
  --accent-glow: rgba(108, 92, 231, 0.15);
  --tag-new: #00d68f;
  --tag-new-bg: rgba(0, 214, 143, 0.12);
  --tag-opt: #4da6ff;
  --tag-opt-bg: rgba(77, 166, 255, 0.12);
  --tag-fix: #ff9f43;
  --tag-fix-bg: rgba(255, 159, 67, 0.12);
  --tag-break: #ff6b6b;
  --tag-break-bg: rgba(255, 107, 107, 0.12);
  --radius: 10px;
  --radius-sm: 6px;
  --transition: 0.2s ease;
}

html { scroll-behavior: smooth; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ========== Header ========== */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(10, 10, 15, 0.82);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}

.header-inner {
  max-width: 960px;
  margin: 0 auto;
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.logo-area {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo-icon {
  width: 36px;
  height: 36px;
  background: linear-gradient(135deg, var(--accent), #a78bfa);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 700;
  color: #fff;
  letter-spacing: -1px;
}

.logo-text {
  font-size: 18px;
  font-weight: 600;
  color: var(--text-primary);
}

.logo-text span {
  color: var(--text-muted);
  font-weight: 400;
  margin-left: 6px;
}

/* Month nav pills */
.month-nav {
  display: flex;
  gap: 6px;
  flex-wrap: nowrap;
}

.month-nav-wrap::-webkit-scrollbar { display: none; }

.month-pill {
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  text-decoration: none;
  transition: all var(--transition);
  white-space: nowrap;
}

.month-pill:hover {
  color: var(--text-primary);
  border-color: var(--accent);
  background: var(--accent-glow);
}

/* ========== Main Layout ========== */
.main {
  max-width: 960px;
  margin: 0 auto;
  padding: 48px 24px 120px;
}

/* ========== Hero ========== */
.hero {
  text-align: center;
  margin-bottom: 64px;
}

.hero h1 {
  font-size: 40px;
  font-weight: 700;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, #e8e8ed, #a78bfa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 12px;
}

.hero p {
  font-size: 17px;
  color: var(--text-secondary);
  max-width: 520px;
  margin: 0 auto;
}

/* ========== Month Section ========== */
.month-section {
  margin-bottom: 72px;
  animation: fadeInUp 0.5s ease both;
}

.month-section:nth-child(2) { animation-delay: 0.1s; }
.month-section:nth-child(3) { animation-delay: 0.2s; }

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

.month-header {
  display: flex;
  align-items: baseline;
  gap: 16px;
  margin-bottom: 28px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  user-select: none;
  position: relative;
}

.month-header .toggle-icon {
  font-size: 16px;
  color: var(--text-muted);
  transition: transform 0.3s ease;
  flex-shrink: 0;
}

.month-header .toggle-icon.expanded {
  transform: rotate(90deg);
}

.month-content {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s ease, opacity 0.3s ease;
  opacity: 0;
}

.month-content.expanded {
  max-height: none;
  opacity: 1;
}

/* Month pills */
.month-pill.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

/* Date group */
.date-group {
  margin-bottom: 32px;
}

.date-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 0;
  cursor: pointer;
  user-select: none;
  border-bottom: 1px dashed var(--border);
  margin-bottom: 16px;
}

.date-header:hover { opacity: 0.85; }

.date-header .toggle-icon {
  font-size: 14px;
  color: var(--text-muted);
  transition: transform 0.3s ease;
  flex-shrink: 0;
}

.date-header .toggle-icon.expanded {
  transform: rotate(90deg);
}

.date-label {
  font-size: 18px;
  font-weight: 600;
  color: var(--text-primary);
}

.date-count {
  font-size: 13px;
  color: var(--text-muted);
}

.date-releases {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.35s ease, opacity 0.25s ease;
  opacity: 0;
}

.date-releases.expanded {
  max-height: none;
  opacity: 1;
}

/* Category group */
.category-group {
  margin-bottom: 20px;
  margin-left: 8px;
}

.category-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 0;
  cursor: pointer;
  user-select: none;
}

.category-header:hover { opacity: 0.85; }

.category-header .toggle-icon {
  font-size: 12px;
  color: var(--text-muted);
  transition: transform 0.3s ease;
  flex-shrink: 0;
}

.category-header .toggle-icon.expanded {
  transform: rotate(90deg);
}

.category-label {
  font-size: 14px;
  font-weight: 600;
  padding: 2px 10px;
  border-radius: 4px;
}

.category-count {
  font-size: 12px;
  color: var(--text-muted);
}

.category-features {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.35s ease, opacity 0.25s ease;
  opacity: 0;
}

.category-features.expanded {
  max-height: none;
  opacity: 1;
}

.month-tag {
  font-size: 28px;
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: -0.3px;
}

.month-count {
  font-size: 14px;
  color: var(--text-muted);
  font-weight: 400;
}

/* ========== Release Subsection ========== */
.release-sub {
  margin-bottom: 32px;
}

.release-sub-header {
  display: flex;
  align-items: baseline;
  gap: 12px;
  margin-bottom: 16px;
  padding-bottom: 8px;
  border-bottom: 1px dashed var(--border);
}

.release-version {
  font-size: 16px;
  font-weight: 600;
  color: var(--accent);
}

.release-date {
  font-size: 13px;
  color: var(--text-muted);
}

/* ========== Feature Card ========== */
.feature-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.feature-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  transition: all var(--transition);
  overflow: hidden;
}

.feature-card:hover {
  border-color: var(--border-light);
  background: var(--bg-hover);
}

.feature-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 20px;
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
}

.feature-header:hover { background: rgba(255,255,255,0.015); }

.expand-icon {
  width: 20px;
  height: 20px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-muted);
  transition: transform 0.25s ease;
  font-size: 12px;
}

.feature-card.open .expand-icon {
  transform: rotate(90deg);
}

.feature-tag {
  display: inline-flex;
  align-items: center;
  padding: 3px 10px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.3px;
  text-transform: uppercase;
  flex-shrink: 0;
  white-space: nowrap;
}

.tag-new     { color: var(--tag-new);   background: var(--tag-new-bg); }
.tag-opt     { color: var(--tag-opt);   background: var(--tag-opt-bg); }
.tag-fix     { color: var(--tag-fix);   background: var(--tag-fix-bg); }
.tag-break   { color: var(--tag-break); background: var(--tag-break-bg); }

.feature-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-primary);
  flex: 1;
  min-width: 0;
}

.feature-summary {
  font-size: 13px;
  color: var(--text-secondary);
  margin-left: auto;
  flex-shrink: 0;
  max-width: 45%;
  text-align: right;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.feature-detail {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.35s ease, padding 0.25s ease;
}

.feature-card.open .feature-detail {
  max-height: 500px;
}

.feature-detail-inner {
  padding: 0 20px 18px 52px;
  font-size: 14px;
  line-height: 1.7;
  color: var(--text-secondary);
}

/* ========== Component Groups ========== */
.component-group {
  margin-bottom: 16px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.component-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  cursor: pointer;
  user-select: none;
  background: rgba(255,255,255,0.015);
  border-bottom: 1px solid transparent;
}
.component-header:hover {
  background: rgba(255,255,255,0.03);
}
.component-header .toggle-icon {
  font-size: 11px;
  color: var(--text-muted);
  transition: transform 0.3s ease;
  flex-shrink: 0;
}
.component-header .toggle-icon.expanded {
  transform: rotate(90deg);
}
.component-name {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-primary);
  font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
}
.component-count {
  font-size: 12px;
  color: var(--text-muted);
  margin-left: auto;
}
.component-items {
  display: flex;
  flex-direction: column;
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.35s ease, opacity 0.25s ease;
  opacity: 0;
}
.component-items.expanded {
  max-height: none;
  opacity: 1;
}
.component-summary {
  padding: 8px 16px 10px;
  font-size: 13px;
  line-height: 1.5;
  color: var(--text-secondary);
  background: rgba(255,255,255,0.01);
}
.feature-single {
  display: flex;
  flex-wrap: wrap;
  align-items: baseline;
  gap: 8px;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
}
.feature-single:last-child { border-bottom: none; }
.feature-single-title {
  font-size: 14px;
  color: var(--text-primary);
  font-weight: 500;
  flex: 1;
  min-width: 0;
}
.feature-single-detail {
  width: 100%;
  font-size: 13px;
  line-height: 1.6;
  color: var(--text-secondary);
  padding-top: 4px;
}

/* ========== Compact Feature Item ========== */
.feature-compact {
  display: flex;
  flex-wrap: wrap;
  align-items: baseline;
  gap: 8px;
  padding: 10px 16px;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
  transition: background 0.15s;
}
.feature-compact:last-child {
  border-bottom: none;
}
.feature-compact:hover {
  background: rgba(255,255,255,0.015);
}
.feature-compact-title {
  font-size: 14px;
  color: var(--text-secondary);
  flex: 1;
  min-width: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.feature-compact-detail {
  display: none;
  width: 100%;
  padding-top: 8px;
  font-size: 13px;
  line-height: 1.6;
  color: var(--text-secondary);
}
.feature-compact.open {
  flex-wrap: wrap;
}
.feature-compact.open .feature-compact-detail {
  display: block;
}

/* ========== Footer ========== */
.footer {
  text-align: center;
  padding: 40px 24px;
  color: var(--text-muted);
  font-size: 13px;
  border-top: 1px solid var(--border);
}

.footer a {
  color: var(--accent);
  text-decoration: none;
}

.footer a:hover { text-decoration: underline; }

/* ========== Responsive ========== */
@media (max-width: 768px) {
  .header-inner {
    flex-direction: column;
    gap: 12px;
    align-items: flex-start;
  }
  .version-nav {
    width: 100%;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    padding-bottom: 4px;
  }
  .hero h1 { font-size: 28px; }
  .hero p { font-size: 15px; }
  .version-tag { font-size: 22px; }
  .feature-summary {
    display: none;
  }
  .feature-header {
    padding: 14px 16px;
  }
  .feature-detail-inner {
    padding-left: 48px;
    padding-right: 16px;
  }
}

@media (max-width: 480px) {
  .main { padding: 32px 16px 80px; }
  .feature-title { font-size: 14px; }
}

/* ========== Scrollbar ========== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-light); }
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-inner">
    <div class="logo-area">
      <div class="logo-icon">OC</div>
      <div class="logo-text">OpenClaw <span>Changelog</span></div>
    </div>
    <nav style="display:flex;gap:8px;align-items:center">
      <a href="index.html" style="padding:5px 12px;border-radius:20px;font-size:13px;font-weight:500;color:#8b8ba0;background:#12121a;border:1px solid #232333;text-decoration:none;transition:all 0.2s;white-space:nowrap" onmouseover="this.style.borderColor='#6c5ce7';this.style.color='#e8e8ed'" onmouseout="this.style.borderColor='#232333';this.style.color='#8b8ba0'">← 全部项目</a>
      <a href="hermes.html" style="padding:5px 12px;border-radius:20px;font-size:13px;font-weight:500;color:#00d68f;background:#12121a;border:1px solid #232333;text-decoration:none;transition:all 0.2s;white-space:nowrap" onmouseover="this.style.borderColor='#00d68f';this.style.color='#e8e8ed'" onmouseout="this.style.borderColor='#232333';this.style.color='#00d68f'">Hermes →</a>
    </nav>
  </div>
  <div style="width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none" class="month-nav-wrap">
    <div class="header-inner" style="padding-top:0">
      <nav class="month-nav" id="monthNav" style="flex-wrap:nowrap"></nav>
    </div>
  </div>
</header>

<!-- Main -->
<main class="main">
  <div class="hero">
    <h1>What's New</h1>
    <p>OpenClaw 的每一次进化，都在这里记录。新功能、优化与重要变更。</p>
  </div>
  <div id="changelog"></div>
</main>

<!-- Footer -->
<footer class="footer">
  Synced from <a href="https://github.com/openclaw/openclaw" target="_blank">OpenClaw</a> · OpenClaw Changelog
</footer>

<!-- ========== DATA (synced from OpenClaw releases) ========== -->
<script src="openclaw_data.js"></script>


<!-- ========== RENDER ENGINE ========== -->
<script>
(function() {
  const TAG_MAP = {
    '新功能':  { cls: 'tag-new',   label: '新功能' },
    '优化':    { cls: 'tag-opt',   label: '优化' },
    '修复':    { cls: 'tag-fix',   label: '修复' },
    'Breaking':{ cls: 'tag-break', label: 'BREAKING' }
  };

  // Category order for display
  const CAT_ORDER = ['Breaking', '新功能', '修复'];
  const CAT_LABELS = { '新功能': '新功能', '修复': '修复', 'Breaking': 'Breaking' };

  let currentMonthIdx = 0;

  function esc(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  // --- Nav ---
  function renderNav() {
    const nav = document.getElementById('monthNav');
    nav.innerHTML = CHANGELOG_DATA.map((m, i) =>
      `<a class="month-pill${i === currentMonthIdx ? ' active' : ''}" data-month="${i}" onclick="switchMonth(${i})">${m.month}</a>`
    ).join('');
  }

  window.switchMonth = function(idx) {
    currentMonthIdx = idx;
    renderNav();
    renderMonth();
  };

  // --- Feature card ---
  function renderFeatureCard(f, i) {
    const tag = TAG_MAP[f.tag] || TAG_MAP['新功能'];
    return `
      <div class="feature-card" data-index="${i}">
        <div class="feature-header" onclick="toggleCard(this)">
          <span class="expand-icon">▶</span>
          <span class="feature-tag ${tag.cls}">${tag.label}</span>
          <span class="feature-title">${esc(f.title)}</span>
          <span class="feature-summary">${esc(f.summary)}</span>
        </div>
        <div class="feature-detail">
          <div class="feature-detail-inner">${esc(f.detail)}</div>
        </div>
      </div>`;
  }

  /**
   * Extract component prefix from title.
   * Handles formats like:
   *   "Plugin SDK: expose ..." → "Plugin SDK"
   *   "Codex Computer Use setup now ships with" → "Codex"
   *   "Sandbox/Docker: add..." → "Sandbox/Docker"
   *   "DeepInfra joins the bundled provider set" → "DeepInfra"
   */
  function extractComponent(title) {
    // Try colon-separated prefix: "Component: description"
    const colonM = title.match(/^([A-Za-z][\w/.-]*(?:\s+[A-Za-z][\w/.-]*)*)\s*[:：]\s/);
    if (colonM) {
      const prefix = colonM[1].trim();
      // Keep as-is if it contains slash (module path) or is short enough
      if (prefix.includes('/') || prefix.split(/\s+/).length <= 3) return prefix;
    }
    // Otherwise: extract first capitalized word (the actual component/SDK name)
    const wordM = title.match(/^([A-Z][a-zA-Z0-9]+(?:\/[A-Z][a-zA-Z0-9]+)*)/);
    return wordM ? wordM[1] : null;
  }

  /**
   * Group features by component prefix, return HTML.
   * Each group is a collapsible section with a compact feature list.
   */
  function renderFeatureGroups(feats, dIdx) {
    // Group by component prefix
    const groups = new Map();
    for (const f of feats) {
      const comp = extractComponent(f.title) || 'Other';
      if (!groups.has(comp)) groups.set(comp, []);
      groups.get(comp).push(f);
    }

    // Single component with few features: render directly as compact list
    if (groups.size <= 1 && feats.length <= 3) {
      return feats.map(f => {
        const tag = TAG_MAP[f.tag] || TAG_MAP['新功能'];
        const displayText = f.summaryZh || f.title;
        return `<div class="feature-compact" onclick="this.classList.toggle('open')">
          <span class="feature-tag ${tag.cls}" style="font-size:10px">${tag.label}</span>
          <span class="feature-compact-title">${esc(displayText)}</span>
          <div class="feature-compact-detail">${esc(f.detail)}</div>
        </div>`;
      }).join('');
    }

    // Multiple groups: render each as collapsible (skip wrapper for single-item groups)
    const expanded = dIdx === 0;
    return Array.from(groups.entries()).map(([comp, items]) => {
      const itemsHtml = items.map(f => {
        const tag = TAG_MAP[f.tag] || TAG_MAP['新功能'];
        const displayText = f.summaryZh || f.title;
        return `<div class="feature-compact" onclick="this.classList.toggle('open')">
          <span class="feature-tag ${tag.cls}" style="font-size:10px">${tag.label}</span>
          <span class="feature-compact-title">${esc(displayText)}</span>
          <div class="feature-compact-detail">${esc(f.detail)}</div>
        </div>`;
      }).join('');

      // Single item: render directly with full detail visible
      if (items.length === 1) {
        const tag = TAG_MAP[items[0].tag] || TAG_MAP['新功能'];
        const displayText = items[0].summaryZh || items[0].title;
        return `<div class="feature-single">
          <span class="feature-tag ${tag.cls}" style="font-size:10px">${tag.label}</span>
          <span class="feature-single-title">${esc(displayText)}</span>
          <span class="feature-single-detail">${esc(items[0].detail)}</span>
        </div>`;
      }

      // Generate summary: prefer summaryZh, fallback to English
      const summaryText = items.slice(0, 3).map(f => {
        if (f.summaryZh) return f.summaryZh;
        const text = f.detail || f.summary || '';
        const firstSentence = text.split(/[.。]/)[0].trim();
        return firstSentence.length > 100 ? firstSentence.slice(0, 100) + '...' : firstSentence;
      }).join('；');

      return `<div class="component-group">
        <div class="component-header" onclick="toggleComponent(this)">
          <span class="toggle-icon${expanded ? ' expanded' : ''}">▶</span>
          <span class="component-name">${esc(comp)}</span>
          <span class="component-count">${items.length} 项</span>
        </div>
        <div class="component-summary">${esc(summaryText)}</div>
        <div class="component-items${expanded ? ' expanded' : ''}">
          ${itemsHtml}
        </div>
      </div>`;
    }).join('');
  }

  // --- Main renderer (single month) ---
  function renderMonth() {
    const container = document.getElementById('changelog');
    const month = CHANGELOG_DATA[currentMonthIdx];
    if (!month) { container.innerHTML = ''; return; }

    const releaseCount = month.releases.reduce((sum, r) => sum + r.features.length, 0);

    // Group releases by date
    const dateMap = new Map();
    for (const r of month.releases) {
      if (!dateMap.has(r.date)) dateMap.set(r.date, []);
      dateMap.get(r.date).push(r);
    }
    // Sort dates descending
    const dates = Array.from(dateMap.keys()).sort((a, b) => b.localeCompare(a));

    const datesHtml = dates.map((date, dIdx) => {
      const releases = dateMap.get(date);
      const totalFeatures = releases.reduce((s, r) => s + r.features.length, 0);
      const versionList = releases.map(r => r.version).join(', ');

      // Group features by category across all releases for this date
      const catMap = new Map();
      for (const r of releases) {
        for (const f of r.features) {
          const cat = f.tag || '新功能';
          if (!catMap.has(cat)) catMap.set(cat, []);
          catMap.get(cat).push(f);
        }
      }

      const catsHtml = CAT_ORDER
        .filter(cat => catMap.has(cat))
        .map((cat, cIdx) => {
          const feats = catMap.get(cat);
          const tag = TAG_MAP[cat] || TAG_MAP['新功能'];
          return `
            <div class="category-group">
              <div class="category-header" onclick="toggleCategory(this)">
                <span class="toggle-icon${dIdx === 0 ? ' expanded' : ''}">▶</span>
                <span class="category-label ${tag.cls}">${tag.label}</span>
                <span class="category-count">${feats.length} 项</span>
              </div>
              <div class="category-features${dIdx === 0 ? ' expanded' : ''}">
                ${renderFeatureGroups(feats, dIdx)}
              </div>
            </div>`;
        }).join('');

      return `
        <div class="date-group">
          <div class="date-header" onclick="toggleDate(this)">
            <span class="toggle-icon${dIdx === 0 ? ' expanded' : ''}">▶</span>
            <span class="date-label">${esc(date)}</span>
            <span class="date-count">${versionList} · ${totalFeatures} 项变更</span>
          </div>
          <div class="date-releases${dIdx === 0 ? ' expanded' : ''}">
            ${catsHtml}
          </div>
        </div>`;
    }).join('');

    container.innerHTML = `
      <section class="month-section" id="${month.monthId}">
        <div class="month-header">
          <span class="month-tag">${esc(month.month)}</span>
          <span class="month-count">${month.releases.length} 个版本 · ${releaseCount} 项变更</span>
        </div>
        <div class="month-content expanded">
          ${datesHtml}
        </div>
      </section>`;
  }

  // --- Toggle handlers ---
  window.toggleCard = function(header) {
    header.parentElement.classList.toggle('open');
  };

  window.toggleDate = function(header) {
    const content = header.nextElementSibling;
    const icon = header.querySelector('.toggle-icon');
    content.classList.toggle('expanded');
    icon.classList.toggle('expanded');
  };

  window.toggleCategory = function(header) {
    const content = header.nextElementSibling;
    const icon = header.querySelector('.toggle-icon');
    content.classList.toggle('expanded');
    icon.classList.toggle('expanded');
  };

  window.toggleComponent = function(header) {
    const content = header.nextElementSibling;
    const icon = header.querySelector('.toggle-icon');
    content.classList.toggle('expanded');
    icon.classList.toggle('expanded');
  };

  // --- Init ---
  renderNav();
  renderMonth();
})();
</script>

</body>
</html>
